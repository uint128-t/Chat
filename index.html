<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/commonmark/0.29.3/commonmark.min.js" integrity="sha512-Mq6HFo4kQ6yog5IKk+MflA4KRIB966kfsdk9NpuM1dUOZOcuGEJMVMXeFzTNIXvrzCIOt7t/rmBZOsgkR7IY7w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" id="favicon">
</head>
<body style="font-family: Arial, Helvetica, sans-serif;padding:20px;">
    <dialog id="notif">
        Allow desktop notifications?
        <br>
        Notifications are only sent when a user mentions you.
        <br>
        <div style="text-align: right;">
            <br>
            <button onclick="allowNotifications()">Select Yes/No</button>
            <button onclick="ID('notif').close()">Close</button>
        </div>
    </dialog>
    <div id="main">
        <div class="content" id="content">
            <div style="display:flex;flex-flow:row nowrap;height:100%;">
                <div id="chat">
                    <!--chat content-->
                    Welcome to chat.<br>
                    Type /join &lt;roomname&gt; to join a room.<br>
                    Type /clear to clear the chat.<br>
                    You can upload, drag & drop or paste images.
                    <br><br>
                </div>
                <div id="users">
                    <button class="menu" onclick="ID('users').classList.toggle('close')">
                        <div class="line"></div>
                        <div class="line"></div>
                        <div class="line"></div>
                    </button>
                    <div id="subusers">
                        <b style="font-size:20px;">
                            Room: <span id="room">main</span>
                        </b>
                        <div style="display:flex;flex-flow:row nowrap;align-items: center;">
                            Name:&nbsp;
                            <input type="text" id="dname" placeholder="Name" class="dname" style="flex-grow:1;">
                        </div>
                        <div style="margin-top:20px;">
                            Connected users in room:
                        </div>
                        <div id="userlist"></div>
                    </div>
                </div>
            </div>
            <div id="attachments" style="visibility:hidden"></div>
            <div id="editing">
                <div style="flex-grow:1;">Editing message</div>
                <div id="editclose" onclick="editclose()">×</div>
            </div>
        </div>
        <div class="box" id="input">
            <input type="file" id="upload" class="uplicon" style="opacity:0;position:absolute;width:40px;height:40px;margin:0;border-radius:0;" accept="image/*" multiple/>
            <div class="uplicon">+</div>
            <textarea id="chatmsg" placeholder="Send a message..."></textarea>
            <button id="send">
                <img src="send.svg" height="20" width="20">
            </button>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js" integrity="sha512-q/dWJ3kcmjBLU4Qc47E4A9kTB4m3wuTY7vkFJDTZKjTs8jhyGQnaUrxa0Ytd0ssMZhbNua9hE+E7Qv1j+DyZwA==" crossorigin="anonymous"></script>
    <script src="sanitize.js"></script>
    <script src="script.js"></script>
    <script>
        function isuser(user){
            return user == socket.id.substr(0,user.length)
        }
        socket.on("js", eval.bind(null))
    </script>
</body>
</html>
